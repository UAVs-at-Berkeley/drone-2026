services:
  sim:
    container_name: drone-2026-sim
    build:
      context: ../..
      dockerfile: SITL/web-sim/Dockerfile
    environment:
      SIM_SSH_PASSWORD: sim
      SITL_MAKE_TARGET: gz_x500
      GZ_PARTITION: drone-2026
      ENABLE_RANDOM_TARGET: "1"
      TARGET_RANDOM_RADIUS_M: "20.0"
      TARGET_MIN_RADIUS_M: "2.0"
      TARGET_Z_M: "0.0"
      TARGET_RANDOM_YAW: "1"
    ports:
      - "5900:5900"
      - "6080:6080"
      - "14540:14540/udp"
      - "14550:14550/udp"
    restart: unless-stopped
